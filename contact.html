<form action="https://usebasin.com/f/923e1df06cd8" method="POST" name="sentMessage" id="contactForm" class="needs-validation" novalidate>
  <div class="control-group">
    <div class="form-group floating-label-form-group controls">
      <label for="name">Name</label>
      <input type="text" class="form-control" placeholder="Name" id="name" name="name" required>
      <p class="invalid-feedback text-danger">Please enter your name</p>
    </div>
  </div>
  <div class="control-group">
    <div class="form-group floating-label-form-group controls">
      <label>Email Address</label>
      <input type="email" class="form-control" placeholder="Email Address" id="email" name="_replyto" required>
      <p class="invalid-feedback text-danger">Please enter a valid email address</p>
    </div>
  </div>
  <div class="control-group">
    <div class="form-group floating-label-form-group controls">
      <label>Message</label>
      <textarea rows="5" class="form-control" placeholder="Message" id="message" name="message" required></textarea>
      <p class="invalid-feedback text-danger">Please enter a message</p>
    </div>
  </div>
  <br>
  <div id="success"></div>
  <div class="form-group">
    <button type="submit" class="btn btn-primary" id="sendMessageButton">Send</button>
  </div>
</form>
